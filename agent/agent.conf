[agent]
# Central F2BHub server URL
hub_url = http://127.0.0.1:5001
# API key (must match F2BHub AGENT_API_KEY)
api_key = change-me-in-prod
# How often to send heartbeat (seconds)
heartbeat_interval = 60

[fail2ban]
# fail2ban log path
log_path = test_fail2ban.log
# How many lines to read on initial scan (0 = read all history)
initial_lines = 0