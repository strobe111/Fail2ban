<script>
(function() {
    'use strict';

    // SPA navigation тАФ intercept internal links, swap content without full page reload
    var contentPanel = document.querySelector('.left-panel');
    var currentPath = location.pathname;

    function swapContent(html, path) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(html, 'text/html');
        var newContent = doc.querySelector('.left-panel');
        if (newContent && contentPanel) {
            contentPanel.innerHTML = newContent.innerHTML;
            document.title = doc.title || 'F2BHub';
            history.pushState(null, '', path);
            currentPath = path;
        } else {
            location.href = path;
        }
    }

    document.addEventListener('click', function(e) {
        var link = e.target.closest('a');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('//')) return;
        e.preventDefault();
        if (href === currentPath) return;
        fetch(href, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(function(r) { return r.text(); })
            .then(function(html) { swapContent(html, href); })
            .catch(function() { location.href = href; });
    });

    window.addEventListener('popstate', function() {
        var path = location.pathname;
        if (path === currentPath) return;
        fetch(path, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(function(r) { return r.text(); })
            .then(function(html) {
                var parser = new DOMParser();
                var doc = parser.parseFromString(html, 'text/html');
                var newContent = doc.querySelector('.left-panel');
                if (newContent && contentPanel) {
                    contentPanel.innerHTML = newContent.innerHTML;
                    document.title = doc.title || 'F2BHub';
                    currentPath = path;
                } else {
                    location.href = path;
                }
            })
            .catch(function() { location.href = path; });
    });
})();

    var globeContainer = document.getElementById('globe-container');
    var renderArea = document.getElementById('globe-render');
    var globeInst = null;

    var SERVER_LAT = 49.44;
    var SERVER_LNG = 11.02;

    function loadGlobe() {
        fetch('/api/globe').then(function(r) { return r.json(); }).then(function(data) {
            buildGlobe(data.countries);
        }).catch(function(e) {
            console.error('Globe data error:', e);
        });
    }

    function buildGlobe(countries) {
        var points = [];
        var arcs = [];

        countries.forEach(function(c) {
            var coord = COORD_MAP[c.code];
            if (!coord) return;
            points.push({ code: c.code, lat: coord[0], lng: coord[1], total: c.total, active: c.active });
        });

        points.forEach(function(p) {
            arcs.push({
                startLat: p.lat, startLng: p.lng,
                endLat: SERVER_LAT, endLng: SERVER_LNG
            });
        });

        if (globeInst) {
            globeInst.pointsData(points);
            globeInst.arcsData(arcs);
            globeInst.htmlElementsData(points);
            globeInst.ringsData(points);
            return;
        }

        var globe = Globe();
        globe(renderArea);

        // Canvas fills the inner div; container clips with overflow:hidden
        var cw = globeContainer.clientWidth;
        var ch = globeContainer.clientHeight;
        globe.width(Math.round(cw * 2));
        globe.height(ch);

        globe.backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png');
        globe.globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg');
        globe.bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png');
        globe.atmosphereColor('rgba(0, 150, 255, 0.7)');
        globe.atmosphereAltitude(0.25);

        globe.pointsData(points);
        globe.pointColor(function(d) { return d.active > 0 ? '#f85149' : '#00ffff'; });
        globe.pointAltitude(0.02);
        globe.pointRadius(function(d) { return Math.max(0.3, Math.min(1.2, 0.3 + d.total * 0.02)); });

        globe.ringsData(points);
        globe.ringColor(function() { return '#00ffff'; });
        globe.ringMaxRadius(5);
        globe.ringPropagationSpeed(3);
        globe.ringRepeatPeriod(800);

        globe.htmlElementsData(points);
        globe.htmlLat(function(d) { return d.lat; });
        globe.htmlLng(function(d) { return d.lng; });
        globe.htmlAltitude(0.01);
        globe.htmlElement(function(d) {
            var el = document.createElement('div');
            el.className = 'earth-label-card';
            el.innerHTML = '<span class="fi fi-' + d.code.toLowerCase() + '"></span><b>' + d.code + '</b> <span style="color:#f85149;font-size:10px">' + d.active + '/' + d.total + '</span>';
            return el;
        });

        globe.arcsData(arcs);
        globe.arcColor(function() { return ['rgba(0, 255, 255, 0.5)', 'rgba(248, 81, 73, 0.5)']; });
        globe.arcDashLength(0.6);
        globe.arcDashGap(0.2);
        globe.arcDashAnimateTime(2000);
        globe.arcStroke(1.2);
        globe.arcAltitude(0.3);

        globe.controls().enablePan = true;
        globe.controls().enableDamping = true;
        globe.controls().dampingFactor = 0.1;
