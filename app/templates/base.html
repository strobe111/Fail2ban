<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}F2BHub{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="//unpkg.com/globe.gl@2.27.2/dist/globe.gl.min.js"></script>
</head>
<body>

<div id="globe-container">
    <div id="globe-render"></div>
</div>


<div id="layout">
    <div id="main-content">
        <header class="top-bar">
            <div class="brand"><a href="/">F2BHub</a></div>
            <nav class="nav-links">
                <a href="/">概览</a>
                <a href="/servers">服务器</a>
                <a href="/bans">封禁记录</a>
            </nav>
        </header>
        <div class="split-layout">
            <div class="left-panel">
                <main>
                    {% block content %}{% endblock %}
                </main>
            </div>
        </div>
        <footer>F2BHub &mdash; Fail2ban 多服务器封禁看板</footer>
    </div>
</div>

<script>
(function() {
    'use strict';

    // SPA navigation — intercept internal links, swap content without full page reload
    var contentPanel = document.querySelector('.left-panel');
    var currentPath = location.pathname;

    function swapContent(html, path) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(html, 'text/html');
        var newContent = doc.querySelector('.left-panel');
        if (newContent && contentPanel) {
            contentPanel.innerHTML = newContent.innerHTML;
            document.title = doc.title || 'F2BHub';
            history.pushState(null, '', path);
            currentPath = path;
        } else {
            location.href = path;
        }
    }

    document.addEventListener('click', function(e) {
        var link = e.target.closest('a');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('//')) return;
        e.preventDefault();
        if (href === currentPath) return;
        fetch(href, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(function(r) { return r.text(); })
            .then(function(html) { swapContent(html, href); })
            .catch(function() { location.href = href; });
    });

    window.addEventListener('popstate', function() {
        var path = location.pathname;
        if (path === currentPath) return;
        fetch(path, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(function(r) { return r.text(); })
            .then(function(html) {
                var parser = new DOMParser();
                var doc = parser.parseFromString(html, 'text/html');
                var newContent = doc.querySelector('.left-panel');
                if (newContent && contentPanel) {
                    contentPanel.innerHTML = newContent.innerHTML;
                    document.title = doc.title || 'F2BHub';
                    currentPath = path;
                } else {
                    location.href = path;
                }
            })
            .catch(function() { location.href = path; });
    });
})();

(function() {
    'use strict';
    var COORD_MAP = {
        'CN':[35.86,104.20],'HK':[22.32,114.17],'TW':[23.70,120.96],'JP':[36.20,138.25],
        'KR':[35.91,127.77],'SG':[1.35,103.82],'MY':[4.21,101.98],'TH':[15.87,100.99],
        'VN':[14.06,108.28],'PH':[12.88,121.77],'ID':[-0.79,113.92],'IN':[20.59,78.96],
        'PK':[30.38,69.35],'BD':[23.69,90.36],'LK':[7.87,80.77],'MM':[21.92,95.96],
        'KH':[12.57,104.99],'MN':[46.86,103.85],'KZ':[48.02,66.92],'AE':[23.42,53.85],
        'SA':[23.89,45.08],'IL':[31.05,34.85],'TR':[38.96,35.24],'IR':[32.43,53.69],
        'IQ':[33.22,43.68],'US':[37.09,-95.71],'CA':[56.13,-106.35],'MX':[23.63,-102.55],
        'BR':[-14.24,-51.93],'AR':[-38.42,-63.62],'CL':[-35.68,-71.54],'CO':[4.57,-74.30],
        'PE':[-9.19,-75.02],'VE':[6.42,-66.59],'AU':[-25.27,133.78],'NZ':[-40.90,174.89],
        'GB':[55.38,-3.44],'IE':[53.41,-8.24],'FR':[46.23,2.21],'DE':[51.17,10.45],
        'IT':[41.87,12.57],'ES':[40.46,-3.75],'PT':[39.40,-8.22],'NL':[52.13,5.29],
        'BE':[50.50,4.47],'CH':[46.82,8.23],'AT':[47.52,14.55],'SE':[60.13,18.64],
        'NO':[60.47,8.47],'FI':[61.92,25.75],'DK':[56.26,9.50],'PL':[51.92,19.15],
        'CZ':[49.82,15.47],'HU':[47.16,19.50],'RO':[45.94,24.97],'BG':[42.73,25.49],
        'GR':[39.07,21.82],'UA':[48.38,31.17],'RU':[61.52,105.32],'ZA':[-30.56,22.94],
        'EG':[26.82,30.80],'NG':[9.08,8.68],'KE':[-0.02,37.91],'ET':[9.15,40.49],
        'MA':[31.79,-7.09],'DZ':[28.03,1.66],'GH':[7.95,-1.02]
    };

    var FLAG_EMOJI = {
        'CN':'🇨🇳','HK':'🇭🇰','TW':'🇹🇼','JP':'🇯🇵','KR':'🇰🇷','SG':'🇸🇬','MY':'🇲🇾',
        'TH':'🇹🇭','VN':'🇻🇳','PH':'🇵🇭','ID':'🇮🇩','IN':'🇮🇳','PK':'🇵🇰','BD':'🇧🇩',
        'LK':'🇱🇰','MM':'🇲🇲','KH':'🇰🇭','MN':'🇲🇳','KZ':'🇰🇿','AE':'🇦🇪','SA':'🇸🇦',
        'IL':'🇮🇱','TR':'🇹🇷','IR':'🇮🇷','IQ':'🇮🇶','US':'🇺🇸','CA':'🇨🇦','MX':'🇲🇽',
        'BR':'🇧🇷','AR':'🇦🇷','CL':'🇨🇱','CO':'🇨🇴','PE':'🇵🇪','VE':'🇻🇪','AU':'🇦🇺',
        'NZ':'🇳🇿','GB':'🇬🇧','IE':'🇮🇪','FR':'🇫🇷','DE':'🇩🇪','IT':'🇮🇹','ES':'🇪🇸',
        'PT':'🇵🇹','NL':'🇳🇱','BE':'🇧🇪','CH':'🇨🇭','AT':'🇦🇹','SE':'🇸🇪','NO':'🇳🇴',
        'FI':'🇫🇮','DK':'🇩🇰','PL':'🇵🇱','CZ':'🇨🇿','HU':'🇭🇺','RO':'🇷🇴','BG':'🇧🇬',
        'GR':'🇬🇷','UA':'🇺🇦','RU':'🇷🇺','ZA':'🇿🇦','EG':'🇪🇬','NG':'🇳🇬','KE':'🇰🇪',
        'ET':'🇪🇹','MA':'🇲🇦','DZ':'🇩🇿','GH':'🇬🇭'
    };

    var globeContainer = document.getElementById('globe-container');
    var renderArea = document.getElementById('globe-render');
    var globeInst = null;

    function loadGlobe() {
        fetch('/api/globe').then(function(r) { return r.json(); }).then(function(data) {
            buildGlobe(data.countries);
        }).catch(function(e) {
            console.error('Globe data error:', e);
        });
    }

    function buildGlobe(countries) {
        var points = [];
        var arcs = [];
        var centerCoord = null;

        countries.forEach(function(c) {
            var coord = COORD_MAP[c.code];
            if (!coord) return;
            if (!centerCoord) centerCoord = coord;
            points.push({ code: c.code, lat: coord[0], lng: coord[1], total: c.total, active: c.active });
        });

        if (centerCoord) {
            points.forEach(function(p) {
                if (p.code !== countries[0].code) {
                    arcs.push({
                        startLat: centerCoord[0], startLng: centerCoord[1],
                        endLat: p.lat, endLng: p.lng
                    });
                }
            });
        }

        if (globeInst) {
            globeInst.pointsData(points);
            globeInst.arcsData(arcs);
            globeInst.htmlElementsData(points);
            globeInst.ringsData(points);
            return;
        }

        var globe = Globe();
        globe(renderArea);

        // Canvas fills the inner div; container clips with overflow:hidden
        var cw = globeContainer.clientWidth;
        var ch = globeContainer.clientHeight;
        globe.width(Math.round(cw * 2));
        globe.height(ch);

        globe.backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png');
        globe.globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg');
        globe.bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png');
        globe.atmosphereColor('rgba(0, 150, 255, 0.7)');
        globe.atmosphereAltitude(0.25);

        globe.pointsData(points);
        globe.pointColor(function(d) { return d.active > 0 ? '#f85149' : '#00ffff'; });
        globe.pointAltitude(0.02);
        globe.pointRadius(function(d) { return Math.max(0.3, Math.min(1.2, 0.3 + d.total * 0.02)); });

        globe.ringsData(points);
        globe.ringColor(function() { return '#00ffff'; });
        globe.ringMaxRadius(5);
        globe.ringPropagationSpeed(3);
        globe.ringRepeatPeriod(800);

        globe.htmlElementsData(points);
        globe.htmlLat(function(d) { return d.lat; });
        globe.htmlLng(function(d) { return d.lng; });
        globe.htmlAltitude(0.01);
        globe.htmlElement(function(d) {
            var el = document.createElement('div');
            var emoji = FLAG_EMOJI[d.code] || '🏁';
            el.className = 'earth-label-card';
            el.innerHTML = '<span class="flag-emoji">' + emoji + '</span><b>' + d.code + '</b> <span style="color:#f85149;font-size:10px">' + d.active + '/' + d.total + '</span>';
            return el;
        });

        globe.arcsData(arcs);
        globe.arcColor(function() { return ['rgba(0, 255, 255, 0.5)', 'rgba(248, 81, 73, 0.5)']; });
        globe.arcDashLength(0.6);
        globe.arcDashGap(0.2);
        globe.arcDashAnimateTime(2000);
        globe.arcStroke(1.2);
        globe.arcAltitude(0.3);

        var center = countries.find(function(c) { return c.code === 'CN'; }) || countries[0];
        var cc = COORD_MAP[center.code] || [20, 0];
        globe.pointOfView({ lat: 20, lng: 120, altitude: 2.2 }, 0);

        globe.controls().autoRotate = true;
        globe.controls().autoRotateSpeed = 0.4;
        globe.controls().enableZoom = true;
        globe.controls().enablePan = true;
        globe.controls().enableDamping = true;
        globe.controls().dampingFactor = 0.1;

        globeInst = globe;
    }

    window.addEventListener('resize', function() {
        if (globeInst) {
            globeInst.width(Math.round(globeContainer.clientWidth * 2));
            globeInst.height(globeContainer.clientHeight);
        }
    });

    setTimeout(loadGlobe, 100);
    setInterval(loadGlobe, 60000);
})();
</script>
</body>
</html>
